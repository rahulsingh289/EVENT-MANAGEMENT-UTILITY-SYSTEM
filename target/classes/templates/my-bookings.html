<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Bookings — Event Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f1f5f9; }
        .page-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            color: white;
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
        }
        .page-banner h2 { font-weight: 700; margin-bottom: .25rem; }
        .booking-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            transition: transform .2s, box-shadow .2s;
            overflow: hidden;
        }
        .booking-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.11); }
        .booking-card .card-body { padding: 1.5rem; }
        .booking-card .card-footer { background: #f8fafc; border: none; padding: 1rem 1.5rem; }
        .status-confirmed { background: #dcfce7; color: #16a34a; border-radius: 20px; padding: .25rem .85rem; font-size: .8rem; font-weight: 600; }
        .status-cancelled { background: #fee2e2; color: #dc2626; border-radius: 20px; padding: .25rem .85rem; font-size: .8rem; font-weight: 600; }
        .status-used      { background: #e2e8f0; color: #64748b; border-radius: 20px; padding: .25rem .85rem; font-size: .8rem; font-weight: 600; }
        .meta-chip {
            display: inline-flex; align-items: center; gap: .35rem;
            font-size: .82rem; color: #64748b;
            background: #f1f5f9; border-radius: 20px; padding: .25rem .75rem;
        }
        .btn-ticket {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 8px; color: white;
            font-size: .85rem; font-weight: 500; padding: .4rem .9rem;
            transition: opacity .2s, transform .1s;
        }
        .btn-ticket:hover { opacity: .9; transform: translateY(-1px); color: white; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: #94a3b8; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <div class="page-banner">
        <h2><i class="bi bi-bookmark-check me-2"></i>My Bookings</h2>
        <p>View and manage all your event tickets</p>
    </div>

    <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 rounded-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 rounded-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        <i class="bi bi-ticket-perforated"></i>
        <h5 class="fw-semibold text-secondary">No bookings yet</h5>
        <p class="text-muted mb-4">You haven't booked any events. Start exploring!</p>
        <a href="/events" class="btn text-white rounded-3 px-4 py-2"
           style="background: linear-gradient(135deg,#667eea,#764ba2); border:none;">
            <i class="bi bi-search me-1"></i>Browse Events
        </a>
    </div>

    <!-- Booking cards -->
    <div class="row row-cols-1 row-cols-md-2 g-4" th:unless="${#lists.isEmpty(bookings)}">
        <div class="col" th:each="booking : ${bookings}">
            <div class="booking-card card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="fw-bold mb-0" th:text="${booking.event.title}"></h5>
                        <span th:switch="${booking.status}">
                            <span th:case="'CONFIRMED'" class="status-confirmed"><i class="bi bi-check-circle me-1"></i>Confirmed</span>
                            <span th:case="'CANCELLED'" class="status-cancelled"><i class="bi bi-x-circle me-1"></i>Cancelled</span>
                            <span th:case="'USED'"      class="status-used"><i class="bi bi-check2-all me-1"></i>Used</span>
                        </span>
                    </div>
                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <span class="meta-chip">
                            <i class="bi bi-geo-alt-fill" style="color:#667eea;"></i>
                            <span th:text="${booking.event.venue}"></span>
                        </span>
                        <span class="meta-chip">
                            <i class="bi bi-calendar3" style="color:#667eea;"></i>
                            <span th:text="${booking.event.eventDate != null ? #temporals.format(booking.event.eventDate, 'dd MMM yyyy, HH:mm') : 'TBD'}"></span>
                        </span>
                        <span class="meta-chip">
                            <i class="bi bi-clock-history" style="color:#667eea;"></i>
                            Booked <span th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy')}"></span>
                        </span>
                    </div>
                </div>
                <div class="card-footer d-flex gap-2" th:if="${booking.status == 'CONFIRMED'}">
                    <a th:href="@{/bookings/{id}/ticket(id=${booking.id})}"
                       class="btn-ticket btn flex-grow-1 text-center">
                        <i class="bi bi-qr-code me-1"></i>View Ticket
                    </a>
                    <form th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-danger btn-sm rounded-3 px-3 py-2"
                                onclick="return confirm('Cancel this booking?')">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
