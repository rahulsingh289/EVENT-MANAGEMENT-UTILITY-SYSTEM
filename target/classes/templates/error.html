<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error — Event Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .error-icon {
            font-size: 4rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: .5rem;
        }
        .btn-home {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            padding: .65rem 1.75rem;
            transition: opacity .2s;
        }
        .btn-home:hover { opacity: .88; color: white; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon">
        <i th:class="${status == 404} ? 'bi bi-compass' : 'bi bi-exclamation-triangle'"></i>
    </div>
    <div class="error-code" th:text="${status ?: 500}"></div>
    <h4 class="fw-semibold text-dark mb-2" th:text="${status == 404} ? 'Page Not Found' : 'Something Went Wrong'"></h4>
    <p class="text-muted mb-4" th:text="${message ?: 'An unexpected error occurred. Please try again.'}"></p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-3 px-4">
            <i class="bi bi-arrow-left me-1"></i>Go Back
        </a>
        <a href="/dashboard" class="btn-home btn">
            <i class="bi bi-house me-1"></i>Dashboard
        </a>
    </div>
</div>
</body>
</html>
