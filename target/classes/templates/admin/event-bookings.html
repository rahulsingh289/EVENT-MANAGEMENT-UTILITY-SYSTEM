<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Event Bookings — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f1f5f9; }
        .page-banner {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border-radius: 16px;
            color: white;
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
        }
        .page-banner h2 { font-weight: 700; margin-bottom: .25rem; }
        .page-banner p { opacity: .85; margin: 0; }
        .meta-chip {
            display: inline-flex; align-items: center; gap: .35rem;
            font-size: .82rem; color: rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.15);
            border-radius: 20px; padding: .3rem .85rem;
        }
        .table-card {
            border: none; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-size: .8rem; text-transform: uppercase;
            letter-spacing: .5px; color: #64748b;
            font-weight: 600; padding: 1rem 1.25rem;
        }
        .table tbody td {
            padding: 1rem 1.25rem;
            vertical-align: middle;
            border-color: #f1f5f9;
            font-size: .92rem;
        }
        .table tbody tr:hover { background: #f8fafc; }
        .status-confirmed { background: #dcfce7; color: #16a34a; border-radius: 20px; padding: .25rem .85rem; font-size: .8rem; font-weight: 600; }
        .status-cancelled { background: #fee2e2; color: #dc2626; border-radius: 20px; padding: .25rem .85rem; font-size: .8rem; font-weight: 600; }
        .status-used      { background: #e2e8f0; color: #64748b; border-radius: 20px; padding: .25rem .85rem; font-size: .8rem; font-weight: 600; }
        .empty-state { text-align: center; padding: 3rem 2rem; color: #94a3b8; }
        .empty-state i { font-size: 2.5rem; margin-bottom: .75rem; display: block; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <div class="page-banner">
        <h2><i class="bi bi-journal-text me-2"></i><span th:text="${event.title}"></span></h2>
        <div class="d-flex flex-wrap gap-2 mt-2">
            <span class="meta-chip">
                <i class="bi bi-geo-alt-fill"></i><span th:text="${event.venue}"></span>
            </span>
            <span class="meta-chip">
                <i class="bi bi-calendar3"></i>
                <span th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy, HH:mm')}"></span>
            </span>
            <span class="meta-chip">
                <i class="bi bi-people-fill"></i>
                <span th:text="${#lists.size(bookings)} + ' bookings'"></span>
            </span>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="/admin/events" class="btn btn-outline-secondary rounded-3">
            <i class="bi bi-arrow-left me-1"></i>Back to Events
        </a>
        <a href="/admin/scan" class="btn btn-outline-danger rounded-3">
            <i class="bi bi-qr-code-scan me-1"></i>Scan Tickets
        </a>
    </div>

    <div class="table-card card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
                <i class="bi bi-inbox"></i>
                <h6 class="fw-semibold text-secondary">No bookings yet</h6>
                <p class="text-muted small">Bookings will appear here once users register.</p>
            </div>
            <div class="table-responsive" th:unless="${#lists.isEmpty(bookings)}">
                <table class="table mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Attendee</th>
                        <th>Booked On</th>
                        <th>Status</th>
                        <th>Ticket Code</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td class="text-muted" th:text="${booking.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:white;font-size:.8rem;font-weight:700;"
                                     th:text="${#strings.substring(booking.user.username,0,1).toUpperCase()}"></div>
                                <span class="fw-semibold" th:text="${booking.user.username}"></span>
                            </div>
                        </td>
                        <td th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy, HH:mm')}"></td>
                        <td>
                            <span th:switch="${booking.status}">
                                <span th:case="'CONFIRMED'" class="status-confirmed"><i class="bi bi-check-circle me-1"></i>Confirmed</span>
                                <span th:case="'CANCELLED'" class="status-cancelled"><i class="bi bi-x-circle me-1"></i>Cancelled</span>
                                <span th:case="'USED'"      class="status-used"><i class="bi bi-check2-all me-1"></i>Used</span>
                            </span>
                        </td>
                        <td><code class="text-secondary" th:text="${booking.ticketCode}"></code></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
