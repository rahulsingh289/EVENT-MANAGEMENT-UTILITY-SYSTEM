# ── Database ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/eventdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Prevent lazy-loading issues outside transactions
spring.jpa.open-in-view=true

# ── Thymeleaf ─────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ── App ───────────────────────────────────────────────────────────────────
# Base URL embedded in QR codes — change to your server IP/domain in production
app.base-url=http://localhost:8080

# Secret key to access /register/admin?secret=... — change this before deploying
app.admin-secret=11

# One-time admin promotion — set to your username, restart app, then remove this line
app.init-admin-username=qw

# ── Mail (Gmail SMTP) ─────────────────────────────────────────────────────
# Set app.mail.enabled=false to disable email (app still works without it)
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=chandrahul1001@gmail.com
spring.mail.password=12345
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# To enable: set app.mail.enabled=true and fill in username/password above
# Get an App Password at: https://myaccount.google.com/apppasswords

# ── Error Handling ────────────────────────────────────────────────────────
spring.mvc.throw-exception-if-no-handler-found=true
