<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Events — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f1f5f9; }
        .page-banner {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            border-radius: 16px;
            color: white;
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
        }
        .page-banner h2 { font-weight: 700; margin-bottom: .25rem; }
        .page-banner p { opacity: .85; margin: 0; }
        .table-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .table-card .card-body { padding: 0; }
        .table thead th {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #64748b;
            font-weight: 600;
            padding: 1rem 1.25rem;
        }
        .table tbody td {
            padding: 1rem 1.25rem;
            vertical-align: middle;
            border-color: #f1f5f9;
            font-size: .92rem;
        }
        .table tbody tr:hover { background: #f8fafc; }
        .btn-new {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border: none; border-radius: 10px; color: white;
            font-weight: 600; padding: .6rem 1.25rem;
            transition: opacity .2s, transform .1s;
        }
        .btn-new:hover { opacity: .9; transform: translateY(-1px); color: white; }
        .price-tag {
            background: #f0fdf4; color: #16a34a;
            border-radius: 20px; padding: .2rem .75rem;
            font-size: .8rem; font-weight: 600;
        }
        .price-free {
            background: #eff6ff; color: #2563eb;
            border-radius: 20px; padding: .2rem .75rem;
            font-size: .8rem; font-weight: 600;
        }
        .status-badge {
            border-radius: 20px; padding: .2rem .75rem;
            font-size: .75rem; font-weight: 600;
            text-transform: uppercase;
        }
        .status-published { background: #dcfce7; color: #16a34a; }
        .status-draft { background: #f3f4f6; color: #6b7280; }
        .status-cancelled { background: #fee2e2; color: #dc2626; }
        .status-completed { background: #dbeafe; color: #2563eb; }
        .empty-state { text-align: center; padding: 3rem 2rem; color: #94a3b8; }
        .empty-state i { font-size: 2.5rem; margin-bottom: .75rem; display: block; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <div class="page-banner d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h2><i class="bi bi-shield-check me-2"></i>Event Management</h2>
            <p>Create, edit and manage all events on the platform</p>
        </div>
        <a href="/admin/events/new" class="btn-new btn">
            <i class="bi bi-plus-lg me-1"></i>New Event
        </a>
    </div>

    <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 rounded-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 rounded-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
    </div>

    <div class="table-card card">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(events)}" class="empty-state">
                <i class="bi bi-calendar-x"></i>
                <h6 class="fw-semibold text-secondary">No events yet</h6>
                <p class="text-muted small">Create your first event to get started.</p>
            </div>
            <div class="table-responsive" th:unless="${#lists.isEmpty(events)}">
                <table class="table mb-0">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Venue</th>
                        <th>Date</th>
                        <th>Capacity</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${events}">
                        <td class="text-muted" th:text="${event.id}"></td>
                        <td class="fw-semibold" th:text="${event.title}"></td>
                        <td>
                            <span class="text-muted"><i class="bi bi-geo-alt me-1"></i></span>
                            <span th:text="${event.venue}"></span>
                        </td>
                        <td th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy, HH:mm')}"></td>
                        <td>
                            <span class="text-muted"><i class="bi bi-people me-1"></i></span>
                            <span th:text="${event.capacity}"></span>
                        </td>
                        <td>
                            <span th:if="${event.price != null and event.price > 0}"
                                  class="price-tag" th:text="'₹' + ${event.price}"></span>
                            <span th:if="${event.price == null or event.price == 0}"
                                  class="price-free">Free</span>
                        </td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${'status-' + #strings.toLowerCase(event.status ?: 'published')}"
                                  th:text="${event.status ?: 'PUBLISHED'}"></span>
                        </td>
                        <td>
                            <div class="d-flex gap-1 flex-wrap">
                                <a th:href="@{/admin/events/{id}/edit(id=${event.id})}"
                                   class="btn btn-sm btn-outline-warning rounded-3">
                                    <i class="bi bi-pencil me-1"></i>Edit
                                </a>
                                <a th:href="@{/admin/events/{id}/bookings(id=${event.id})}"
                                   class="btn btn-sm btn-outline-primary rounded-3">
                                    <i class="bi bi-journal-text me-1"></i>Bookings
                                </a>
                                <form th:action="@{/admin/events/{id}/delete(id=${event.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-3"
                                            onclick="return confirm('Delete this event? This cannot be undone.')">
                                        <i class="bi bi-trash me-1"></i>Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
