<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${event.id != null} ? 'Edit Event — Admin' : 'New Event — Admin'">Event Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f1f5f9; }
        .form-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            overflow: hidden;
        }
        .form-card-header {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: white;
            padding: 1.75rem 2rem;
        }
        .form-card-header h4 { font-weight: 700; margin: 0; }
        .form-card-body { padding: 2rem; background: white; }
        .form-label { font-weight: 600; font-size: .88rem; color: #374151; margin-bottom: .4rem; }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            padding: .65rem 1rem;
            transition: border-color .2s, box-shadow .2s;
            font-size: .93rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        textarea.form-control { resize: vertical; min-height: 110px; }
        .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-right: none;
            color: #94a3b8;
        }
        .input-group .form-control { border-radius: 0 10px 10px 0; }
        .btn-save {
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border: none; border-radius: 10px; color: white;
            font-weight: 600; padding: .7rem 2rem;
            transition: opacity .2s, transform .1s;
        }
        .btn-save:hover { opacity: .9; transform: translateY(-1px); color: white; }
        .section-divider {
            font-size: .78rem; text-transform: uppercase; letter-spacing: .6px;
            color: #94a3b8; font-weight: 600;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: .5rem; margin-bottom: 1.25rem; margin-top: 1.5rem;
        }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width: 680px;">
    <div class="form-card">
        <div class="form-card-header">
            <h4>
                <i class="bi bi-calendar-plus me-2" th:if="${event.id == null}"></i>
                <i class="bi bi-pencil-square me-2" th:if="${event.id != null}"></i>
                <span th:text="${event.id != null} ? 'Edit Event' : 'Create New Event'"></span>
            </h4>
        </div>
        <div class="form-card-body">
            <form th:action="${event.id != null} ? @{/admin/events/{id}/edit(id=${event.id})} : @{/admin/events/new}"
                  th:object="${event}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="section-divider">Basic Info</div>

                <div class="mb-3">
                    <label class="form-label">Event Title</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-type"></i></span>
                        <input type="text" class="form-control" th:field="*{title}"
                               placeholder="e.g. Tech Conference 2026" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" th:field="*{description}"
                              placeholder="Describe the event..."></textarea>
                </div>

                <div class="section-divider">Location &amp; Time</div>

                <div class="mb-3">
                    <label class="form-label">Venue</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                        <input type="text" class="form-control" th:field="*{venue}"
                               placeholder="e.g. City Convention Center" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Event Date &amp; Time</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                        <input type="datetime-local" class="form-control" th:field="*{eventDate}" required>
                    </div>
                </div>

                <div class="section-divider">Capacity &amp; Pricing</div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label">Capacity</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-people"></i></span>
                            <input type="number" class="form-control" th:field="*{capacity}" min="1"
                                   placeholder="100" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Price (USD)</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" th:field="*{price}"
                                   step="0.01" min="0" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn-save btn">
                        <i class="bi bi-check-lg me-1"></i>Save Event
                    </button>
                    <a href="/admin/events" class="btn btn-outline-secondary rounded-3 px-4">
                        <i class="bi bi-x-lg me-1"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
