<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Events — EventHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f1f5f9; }
        .page-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px; color: white;
            padding: 2rem 2.5rem; margin-bottom: 2rem;
        }
        .page-banner h2 { font-weight: 700; margin-bottom: .25rem; }
        .page-banner p  { opacity: .85; margin: 0; }
        .event-card {
            border: none; border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            transition: transform .2s, box-shadow .2s; overflow: hidden;
        }
        .event-card:hover { transform: translateY(-5px); box-shadow: 0 10px 36px rgba(0,0,0,0.13); }
        .event-card .card-body  { padding: 1.5rem; }
        .event-card .card-footer { background: #f8fafc; border: none; padding: 1rem 1.5rem; }
        .event-accent {
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .badge-price {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border-radius: 20px;
            padding: .3rem .85rem; font-size: .78rem; font-weight: 600;
        }
        .badge-free {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; border-radius: 20px;
            padding: .3rem .85rem; font-size: .78rem; font-weight: 600;
        }
        .search-wrap { position: relative; }
        .search-wrap .bi-search {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%); color: #94a3b8; pointer-events: none;
        }
        .search-input {
            border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.4);
            padding: .65rem 1rem .65rem 2.5rem;
            background: rgba(255,255,255,0.15);
            color: white; min-width: 240px;
            transition: all .2s;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.7); }
        .search-input:focus {
            outline: none; background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.7);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
            color: white;
        }
        .btn-search {
            background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 10px; color: white; font-weight: 500;
            padding: .65rem 1.25rem; transition: background .2s;
        }
        .btn-search:hover { background: rgba(255,255,255,0.3); color: white; }
        .meta-chip {
            display: inline-flex; align-items: center; gap: .35rem;
            font-size: .8rem; color: #64748b;
            background: #f1f5f9; border-radius: 20px; padding: .25rem .75rem;
        }
        .btn-book {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 8px; color: white;
            font-size: .85rem; font-weight: 600; padding: .45rem 1rem;
            transition: opacity .2s, transform .1s;
        }
        .btn-book:hover { opacity: .9; transform: translateY(-1px); color: white; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: #94a3b8; }
        .empty-state i { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <div class="page-banner d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h2><i class="bi bi-calendar-event me-2"></i>Upcoming Events</h2>
            <p>Discover and book events happening near you</p>
        </div>
        <form method="get" action="/events" class="d-flex gap-2">
            <div class="search-wrap">
                <i class="bi bi-search"></i>
                <input type="text" name="search" class="search-input"
                       placeholder="Search events..." th:value="${search}">
            </div>
            <button class="btn-search btn" type="submit">Search</button>
        </form>
    </div>

    <div th:if="${error}"   class="alert alert-danger  d-flex align-items-center gap-2 rounded-3" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 rounded-3" th:text="${success}"></div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="event : ${events}">
            <div class="event-card card h-100">
                <div class="event-accent"></div>
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0" th:text="${event.title}"></h5>
                        <span th:if="${event.price != null and event.price > 0}"
                              class="badge-price ms-2 flex-shrink-0"
                              th:text="'₹' + ${event.price}"></span>
                        <span th:if="${event.price == null or event.price == 0}"
                              class="badge-free ms-2 flex-shrink-0">Free</span>
                    </div>
                    <p class="text-muted small mb-3"
                       th:text="${#strings.abbreviate(event.description, 90)}"
                       th:if="${event.description != null}"></p>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="meta-chip">
                            <i class="bi bi-geo-alt-fill" style="color:#667eea;"></i>
                            <span th:text="${event.venue}"></span>
                        </span>
                        <span class="meta-chip">
                            <i class="bi bi-calendar3" style="color:#667eea;"></i>
                            <span th:text="${event.eventDate != null ? #temporals.format(event.eventDate, 'dd MMM yyyy') : 'TBD'}"></span>
                        </span>
                        <span class="meta-chip">
                            <i class="bi bi-clock" style="color:#667eea;"></i>
                            <span th:text="${event.eventDate != null ? #temporals.format(event.eventDate, 'HH:mm') : 'TBD'}"></span>
                        </span>
                        <span class="meta-chip">
                            <i class="bi bi-people-fill" style="color:#667eea;"></i>
                            <span th:text="${event.capacity} + ' seats'"></span>
                        </span>
                    </div>
                </div>
                <div class="card-footer d-flex gap-2">
                    <a th:href="@{/events/{id}(id=${event.id})}"
                       class="btn btn-outline-secondary btn-sm rounded-3 flex-grow-1">
                        <i class="bi bi-eye me-1"></i>Details
                    </a>
                    <form th:action="@{/events/{id}/book(id=${event.id})}" method="post" class="flex-grow-1">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-book btn w-100">
                            <i class="bi bi-ticket-perforated me-1"></i>Book Now
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${#lists.isEmpty(events)}">
            <div class="empty-state">
                <i class="bi bi-calendar-x"></i>
                <h5 class="fw-semibold text-secondary">No events found</h5>
                <p class="text-muted">Try a different search or check back later.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
