<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Event Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .auth-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .auth-card .card-body { padding: 2.5rem; }
        .brand-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.65rem 1rem;
            border: 1.5px solid #e2e8f0;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn-signin {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 0.7rem;
            font-weight: 600;
            letter-spacing: .3px;
            transition: opacity .2s, transform .1s;
        }
        .btn-signin:hover { opacity: .9; transform: translateY(-1px); }
        .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-right: none;
            color: #94a3b8;
        }
        .input-group .form-control { border-radius: 0 10px 10px 0; }
        .divider { color: #94a3b8; font-size: .85rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div style="width:100%;max-width:420px;" class="px-3">
    <div class="auth-card card">
        <div class="card-body">

            <div class="brand-icon">
                <i class="bi bi-calendar-event text-white fs-4"></i>
            </div>
            <h4 class="text-center fw-bold mb-1">Welcome back</h4>
            <p class="text-center text-muted mb-4" style="font-size:.9rem;">Sign in to your account</p>

            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>Invalid username or password.</span>
            </div>
            <div th:if="${param.logout}" class="alert alert-info d-flex align-items-center gap-2 py-2" role="alert">
                <i class="bi bi-info-circle-fill"></i>
                <span>You have been logged out.</span>
            </div>
            <div th:if="${success}" class="alert alert-success d-flex align-items-center gap-2 py-2" role="alert">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${success}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold" style="font-size:.9rem;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="username" name="username"
                               class="form-control" placeholder="Enter your username" required autofocus/>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold" style="font-size:.9rem;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="Enter your password" required/>
                    </div>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-signin text-white">Sign In</button>
                </div>
            </form>

            <p class="text-center mb-0 divider">
                Don't have an account?
                <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color:#667eea;">Register here</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
