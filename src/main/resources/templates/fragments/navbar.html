<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark sticky-top"
     style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 2px 20px rgba(102,126,234,0.4);">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <div style="width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-calendar-event" style="font-size:.95rem;"></i>
            </div>
            <span>EventHub</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto gap-1 mt-2 mt-lg-0">
                <li class="nav-item">
                    <a class="nav-link text-white px-3 py-2 rounded-3" style="transition:background .2s;"
                       onmouseover="this.style.background='rgba(255,255,255,0.15)'"
                       onmouseout="this.style.background='transparent'"
                       th:href="@{/dashboard}">
                        <i class="bi bi-house me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white px-3 py-2 rounded-3" style="transition:background .2s;"
                       onmouseover="this.style.background='rgba(255,255,255,0.15)'"
                       onmouseout="this.style.background='transparent'"
                       th:href="@{/events}">
                        <i class="bi bi-calendar3 me-1"></i>Events
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white px-3 py-2 rounded-3" style="transition:background .2s;"
                       onmouseover="this.style.background='rgba(255,255,255,0.15)'"
                       onmouseout="this.style.background='transparent'"
                       th:href="@{/my-bookings}">
                        <i class="bi bi-bookmark me-1"></i>My Bookings
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0">
                <span sec:authorize="hasAuthority('ROLE_ADMIN')" class="d-flex gap-2">
                    <a th:href="@{/admin/events}"
                       class="btn btn-sm fw-500 text-white"
                       style="background:rgba(244,63,94,0.9);border:none;border-radius:8px;padding:.4rem .9rem;">
                        <i class="bi bi-shield-check me-1"></i>Manage
                    </a>
                    <a th:href="@{/admin/scan}"
                       class="btn btn-sm fw-500 text-white"
                       style="background:rgba(244,63,94,0.9);border:none;border-radius:8px;padding:.4rem .9rem;">
                        <i class="bi bi-qr-code-scan me-1"></i>Scan
                    </a>
                </span>

                <div class="d-flex align-items-center gap-2 px-3 py-1 rounded-3"
                     style="background:rgba(255,255,255,0.15);">
                    <div style="width:28px;height:28px;background:rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-person-fill" style="font-size:.8rem;"></i>
                    </div>
                    <span class="text-white" style="font-size:.88rem;font-weight:500;" sec:authentication="name">User</span>
                </div>

                <form th:action="@{/logout}" method="post" class="mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-light btn-sm"
                            style="border-radius:8px;font-size:.85rem;border-color:rgba(255,255,255,0.5);">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
